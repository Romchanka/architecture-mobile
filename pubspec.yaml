name: architecture_mobile
description: Real Estate Buyer App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # HTTP client
  dio: ^5.7.0

  # Secure token storage
  flutter_secure_storage: ^9.2.4

  # Image caching
  cached_network_image: ^3.4.1

  # Formatting
  intl: ^0.20.2

  # Loading skeletons
  shimmer: ^3.0.0

  # Fonts
  google_fonts: ^8.0.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/floor-plan-typical.webp
    - assets/images/floor-plan-17.webp
    - assets/images/floor-plan-18.webp
    - assets/images/floor-plan-19.webp
    - assets/images/parking-plan.webp
    - assets/images/parking-plan-2.webp
